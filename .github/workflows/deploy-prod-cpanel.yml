name: Deploy to cPanel via SSH (manual Production)

# Manual-only. Trigger via Actions UI → Run workflow.
# Secrets: PROD_SSH_HOST, PROD_SSH_PORT, PROD_SSH_USER, PROD_REMOTE_ROOT,
#          PROD_SSH_PRIVATE_KEY (+ optional PROD_SSH_PRIVATE_KEY_B64),
#          QA_* API secrets, VITE_API_URL, VITE_APP_NAME.
on:
  workflow_dispatch:

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

env:
  PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
  PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
  PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
  # PROD_REMOTE_ROOT → cPanel document root (e.g. /home/qaaicountly/public_html)
  PROD_REMOTE_ROOT: ${{ secrets.PROD_REMOTE_ROOT }}
  SSH_OPTS: -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o LogLevel=ERROR -o RequestTTY=no

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (with cache)
        if: hashFiles('web/package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Node
        if: hashFiles('web/package-lock.json') == ''
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Create web .env from secrets
        working-directory: web
        run: |
          printf 'VITE_API_URL=%s\nVITE_APP_NAME=%s\n' \
            "${{ secrets.VITE_API_URL }}" \
            "${{ secrets.VITE_APP_NAME }}" \
            > .env

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Verify build output
        run: |
          test -d web/dist || (echo "web/dist missing — build failed" && exit 1)
          echo "Build ready: $(find web/dist -type f | wc -l) files in web/dist"

      - name: Verify server-php exists
        run: |
          test -d server-php || (echo "server-php/ missing — required for cPanel api/" && exit 1)
          test -f server-php/composer.json || (echo "server-php/composer.json missing" && exit 1)
          echo "server-php ready: $(find server-php -type f | wc -l) files"

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pgsql, pdo_pgsql, mbstring, intl, openssl, curl, json
          coverage: none
          tools: composer:v2

      - name: Install server-php Composer dependencies (production)
        working-directory: server-php
        run: |
          composer install --no-dev --no-interaction --no-progress --optimize-autoloader --prefer-dist
          test -d vendor/codeigniter4/framework || (echo "CI4 framework missing after install" && exit 1)
          echo "Composer dependencies installed: $(ls -1 vendor | wc -l) packages"

      - name: Validate required database secrets
        env:
          QA_DB_HOST: ${{ secrets.QA_DB_HOST }}
          QA_DB_NAME: ${{ secrets.QA_DB_NAME }}
          QA_DB_USER: ${{ secrets.QA_DB_USER }}
          QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
        run: |
          missing=0
          for var in QA_DB_HOST QA_DB_NAME QA_DB_USER QA_DB_PASSWORD; do
            val="${!var}"
            if [ -z "$val" ]; then
              echo "::error::GitHub secret $var is empty — migrations cannot run."
              missing=1
            else
              echo "$var is set (length ${#val})"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Write server-php production .env from secrets
        working-directory: server-php
        env:
          QA_API_BASE_URL: ${{ secrets.QA_API_BASE_URL }}
          QA_DB_HOST: ${{ secrets.QA_DB_HOST }}
          QA_DB_PORT: ${{ secrets.QA_DB_PORT }}
          QA_DB_NAME: ${{ secrets.QA_DB_NAME }}
          QA_DB_USER: ${{ secrets.QA_DB_USER }}
          QA_DB_PASSWORD: ${{ secrets.QA_DB_PASSWORD }}
          QA_JWT_SECRET: ${{ secrets.QA_JWT_SECRET }}
          QA_WORKER_TOKEN: ${{ secrets.QA_WORKER_TOKEN }}
          QA_VAULT_KEY: ${{ secrets.QA_VAULT_KEY }}
          QA_ALLOWED_ORIGINS: ${{ secrets.QA_ALLOWED_ORIGINS }}
          QA_OWNER_EMAIL: ${{ secrets.QA_OWNER_EMAIL }}
          QA_OWNER_NAME: ${{ secrets.QA_OWNER_NAME }}
          QA_OWNER_PASSWORD: ${{ secrets.QA_OWNER_PASSWORD }}
        run: |
          # Quote values so special chars ($ @ # spaces) parse correctly in CodeIgniter .env
          python3 << 'PY'
          import os

          def dotenv(v):
              if v is None:
                  v = ""
              v = str(v)
              if v == "":
                  return ""
              if any(c in v for c in ' "#$\\'):
                  return '"' + v.replace("\\", "\\\\").replace('"', '\\"') + '"'
              return v

          lines = [
              "CI_ENVIRONMENT=production",
              f"app.baseURL={dotenv(os.environ.get('QA_API_BASE_URL', ''))}",
              "app.indexPage=",
              "",
              f"QA_DB_HOST={dotenv(os.environ.get('QA_DB_HOST', ''))}",
              f"QA_DB_PORT={dotenv(os.environ.get('QA_DB_PORT', '5432'))}",
              f"QA_DB_NAME={dotenv(os.environ.get('QA_DB_NAME', ''))}",
              f"QA_DB_USER={dotenv(os.environ.get('QA_DB_USER', ''))}",
              f"QA_DB_PASSWORD={dotenv(os.environ.get('QA_DB_PASSWORD', ''))}",
              "",
              f"QA_JWT_SECRET={dotenv(os.environ.get('QA_JWT_SECRET', ''))}",
              "QA_JWT_TTL_MINUTES=720",
              f"QA_WORKER_TOKEN={dotenv(os.environ.get('QA_WORKER_TOKEN', ''))}",
              f"QA_VAULT_KEY={dotenv(os.environ.get('QA_VAULT_KEY', ''))}",
              "",
              "QA_REPORTS_DIR=../qa-reports",
              "",
              f"QA_ALLOWED_ORIGINS={dotenv(os.environ.get('QA_ALLOWED_ORIGINS', ''))}",
              "",
              f"QA_OWNER_EMAIL={dotenv(os.environ.get('QA_OWNER_EMAIL', ''))}",
              f"QA_OWNER_NAME={dotenv(os.environ.get('QA_OWNER_NAME', 'QA Owner'))}",
              f"QA_OWNER_PASSWORD={dotenv(os.environ.get('QA_OWNER_PASSWORD', ''))}",
              "",
          ]
          with open(".env", "w", encoding="utf-8", newline="\n") as f:
              f.write("\n".join(lines))
          PY
          chmod 600 .env
          echo "Production .env written ($(wc -l < .env) lines)"
          grep '^QA_DB_' .env | sed 's/=.*/=***set***/'

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.PROD_SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "$SSH_PRIVATE_KEY_B64" ]; then
            echo "$SSH_PRIVATE_KEY_B64" | tr -d '[:space:]' | base64 --decode | tr -d '\r' > ~/.ssh/deploy_key
          else
            printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          fi

          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub 2>/tmp/ssh-keygen.err; then
            echo "::error::PROD_SSH_PRIVATE_KEY is invalid or passphrase-protected."
            echo "Fix: generate a deploy key WITHOUT a passphrase, paste the full PEM into GitHub Secrets,"
            echo "or store a base64-encoded key in PROD_SSH_PRIVATE_KEY_B64 (recommended)."
            cat /tmp/ssh-keygen.err
            exit 1
          fi

          ssh-keyscan -p "${PROD_SSH_PORT}" "${PROD_SSH_HOST}" >> ~/.ssh/known_hosts
          echo "SSH key loaded and validated"
          echo "Deploy key fingerprint (must match Authorized Keys in cPanel):"
          ssh-keygen -lf ~/.ssh/deploy_key.pub
          echo "Deploy key public line (paste into cPanel → SSH Access → Manage SSH Keys → Import → Authorize):"
          cat ~/.ssh/deploy_key.pub

      - name: Test SSH connection
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          if ! ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "test -d \"${REMOTE_ROOT}\" || mkdir -p \"${REMOTE_ROOT}\" \"${REMOTE_ROOT}/api\" && echo \"Remote paths OK: ${REMOTE_ROOT} and ${REMOTE_ROOT}/api\""; then
            echo "::error::SSH login rejected. Authorize the deploy key public key for PROD_SSH_USER in cPanel."
            echo "Verify PROD_SSH_USER, PROD_SSH_HOST, PROD_SSH_PORT, and PROD_REMOTE_ROOT match your cPanel SSH login."
            exit 1
          fi

      - name: Prepare remote directories
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "mkdir -p \"${REMOTE_ROOT}/api/writable/cache\" \"${REMOTE_ROOT}/api/writable/logs\" \"${REMOTE_ROOT}/api/writable/session\" \"${REMOTE_ROOT}/api/writable/uploads\""

      # server-php/ → PROD_REMOTE_ROOT/api/ via rsync over SSH
      - name: Rsync server-php to public_html/api
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          RSYNC_RSH="ssh -i ~/.ssh/deploy_key -p ${PROD_SSH_PORT} ${SSH_OPTS}"
          DEST="${PROD_SSH_USER}@${PROD_SSH_HOST}:${REMOTE_ROOT}/api/"

          rsync -avz --delete \
            --exclude='.env.example' \
            --exclude='writable/.qa_seed_complete' \
            --exclude='writable/cache/*' \
            --exclude='writable/logs/*' \
            --exclude='writable/session/*' \
            --exclude='writable/uploads/*' \
            --exclude='writable/debugbar/*' \
            --exclude='node_modules' \
            -e "$RSYNC_RSH" \
            server-php/ "$DEST"

          echo "Rsynced server-php → ${REMOTE_ROOT}/api"
          ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "ls -1 \"${REMOTE_ROOT}/api/app/Database/Migrations\"/*.php 2>/dev/null | wc -l || echo '0 migration files on server'"

      - name: Verify deployed .env on server
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} "${PROD_SSH_USER}@${PROD_SSH_HOST}")
          if ! "${SSH_CMD[@]}" "test -f \"${REMOTE_ROOT}/api/.env\""; then
            echo "::error::.env missing at ${REMOTE_ROOT}/api/.env after rsync — migrations cannot run."
            exit 1
          fi
          "${SSH_CMD[@]}" "wc -c \"${REMOTE_ROOT}/api/.env\" && grep -c '^QA_DB_' \"${REMOTE_ROOT}/api/.env\" || true"
          echo ".env present on server"

      - name: Ensure writable directory exists (WRITEPATH)
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} "${PROD_SSH_USER}@${PROD_SSH_HOST}")
          "${SSH_CMD[@]}" "mkdir -p \"${REMOTE_ROOT}/api/writable/cache\" \"${REMOTE_ROOT}/api/writable/logs\" \"${REMOTE_ROOT}/api/writable/session\" \"${REMOTE_ROOT}/api/writable/uploads\""
          if ! "${SSH_CMD[@]}" "test -d \"${REMOTE_ROOT}/api/writable\" && test -w \"${REMOTE_ROOT}/api/writable\""; then
            echo "::error::writable/ missing or not writable at ${REMOTE_ROOT}/api/writable — API will return 503 (WRITEPATH)."
            exit 1
          fi
          echo "writable OK: ${REMOTE_ROOT}/api/writable"

      - name: Diagnose database on server
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} "${PROD_SSH_USER}@${PROD_SSH_HOST}")
          "${SSH_CMD[@]}" "cd \"${REMOTE_ROOT}/api\" && \
            echo '--- PHP ---' && php -v | head -1 && \
            echo '--- pgsql extensions ---' && (php -m | grep -i pgsql || echo 'MISSING: install pdo_pgsql for PHP CLI in cPanel') && \
            echo '--- .env ---' && (test -f .env && echo '.env exists' || echo 'MISSING .env') && \
            (grep '^QA_DB_' .env 2>/dev/null | sed 's/=.*/=***/' || echo 'no QA_DB_* keys in .env') && \
            echo '--- env check ---' && \
            php check-env.php 2>&1 || true && \
            echo '--- spark migrate:status ---' && \
            CI_ENVIRONMENT=development php spark migrate:status 2>&1 || true"

      # migrate: applies pending migrations; seeders run only when migrate succeeds
      - name: Run database migrations
        id: db_migrate
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} "${PROD_SSH_USER}@${PROD_SSH_HOST}")
          echo "Running php spark migrate on ${REMOTE_ROOT}/api ..."
          set +e
          MIGRATE_OUT=$("${SSH_CMD[@]}" "cd \"${REMOTE_ROOT}/api\" && CI_ENVIRONMENT=development php spark migrate 2>&1")
          MIGRATE_RC=$?
          set -e
          echo "$MIGRATE_OUT"
          if [ "$MIGRATE_RC" -ne 0 ]; then
            echo "::error::php spark migrate failed (exit $MIGRATE_RC)."
            echo "Common fixes: (1) quote passwords with \$ in GitHub secrets — redeploy after this workflow update"
            echo "(2) QA_DB_HOST must be reachable from cPanel (not localhost if DB is on another VPS)"
            echo "(3) enable pdo_pgsql + pgsql for PHP CLI in cPanel MultiPHP"
            echo "(4) allow cPanel server IP in PostgreSQL pg_hba / firewall"
            "${SSH_CMD[@]}" "tail -n 50 \"${REMOTE_ROOT}/api/writable/logs/\"*.log 2>/dev/null || echo 'no writable/logs/*.log yet'" || true
            echo "migrate_ok=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "migrate_ok=true" >> "$GITHUB_OUTPUT"
          echo "Migrations complete."

      # seeders: once only — marker writable/.qa_seed_complete on the server
      - name: Run database seeders (first deploy only)
        if: steps.db_migrate.outputs.migrate_ok == 'true'
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          MARKER="${REMOTE_ROOT}/api/writable/.qa_seed_complete"
          SSH_CMD=(ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} "${PROD_SSH_USER}@${PROD_SSH_HOST}")

          if "${SSH_CMD[@]}" "test -f \"${MARKER}\""; then
            echo "Seeders already applied — skipping (marker: writable/.qa_seed_complete)."
            exit 0
          fi

          echo "First deploy — running seeders..."
          run_seed() {
            local seeder="$1"
            echo "--- php spark db:seed ${seeder} ---"
            if ! "${SSH_CMD[@]}" "cd \"${REMOTE_ROOT}/api\" && CI_ENVIRONMENT=development php spark db:seed ${seeder} 2>&1"; then
              echo "::error::Seeder ${seeder} failed (see output above)."
              exit 1
            fi
          }

          run_seed RolesSeeder
          run_seed OwnerSeeder
          run_seed BooksTestDataPackSeeder
          run_seed BooksExpectedResultsSeeder
          run_seed ValidationRulesSeeder
          run_seed SettingsSeeder

          "${SSH_CMD[@]}" "touch \"${MARKER}\" && chmod 644 \"${MARKER}\""
          echo "Seeders complete. Marker created — future deploys will skip seeding."

      # web/dist/ → PROD_REMOTE_ROOT/ via rsync (preserve api/ and php.ini)
      - name: Rsync web/dist to public_html
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          RSYNC_RSH="ssh -i ~/.ssh/deploy_key -p ${PROD_SSH_PORT} ${SSH_OPTS}"
          DEST="${PROD_SSH_USER}@${PROD_SSH_HOST}:${REMOTE_ROOT}/"

          rsync -avz --delete \
            --exclude='api' \
            --exclude='php.ini' \
            -e "$RSYNC_RSH" \
            web/dist/ "$DEST"

          echo "Rsynced web/dist → ${REMOTE_ROOT} (api/ and php.ini preserved)"

      - name: Verify remote deploy
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "ls -la \"${REMOTE_ROOT}\" && ls -la \"${REMOTE_ROOT}/api/index.php\" 2>/dev/null || ls -la \"${REMOTE_ROOT}/api/\""

      - name: Fix file permissions via SSH
        run: |
          REMOTE_ROOT="${PROD_REMOTE_ROOT%/}"
          ssh -i ~/.ssh/deploy_key -p "${PROD_SSH_PORT}" ${SSH_OPTS} \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "find \"${REMOTE_ROOT}\" -maxdepth 1 -type f -exec chmod 644 {} \; && \
             find \"${REMOTE_ROOT}/api\" -type d -exec chmod 755 {} \; && \
             find \"${REMOTE_ROOT}/api\" -type f -exec chmod 644 {} \; && \
             chmod 600 \"${REMOTE_ROOT}/api/.env\" 2>/dev/null || true && \
             chmod -R 775 \"${REMOTE_ROOT}/api/writable\" 2>/dev/null || true && \
             echo 'Permissions fixed' && echo 'Deploy complete: web/dist → public_html, server-php → public_html/api'"
